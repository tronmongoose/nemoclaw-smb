services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - redis
    volumes:
      - ../:/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ui:
    image: node:20-alpine
    working_dir: /app/ui
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ../ui:/app/ui
